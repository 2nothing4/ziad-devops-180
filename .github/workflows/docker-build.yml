name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: |
        cd day9-flask
        docker build -t flask-app:latest .
        
    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: 'latest'
        
    - name: Lint Helm chart
      run: helm lint ./ziad-devops-chart
      
    - name: Template Helm chart
      run: helm template my-app ./ziad-devops-chart
